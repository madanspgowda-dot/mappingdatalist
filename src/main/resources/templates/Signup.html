<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignUp</title>
    <link rel="stylesheet" href="/signup.css">
</head>
<body>

<form th:action="@{/signup}" method="post" th:object="${signupdata}">
    <h1>SignUp</h1>

    <label>Username</label>
    <input type="text" placeholder="Enter The Username" th:field="*{name}" required>

    <label>Email</label>
    <input type="email" placeholder="Enter The Email" th:field="*{email}" required>

    <label>Password</label>
    <input type="password" placeholder="Enter the password" th:field="*{password}" required>

    <label>Confirm Password</label>
    <input type="password" placeholder="Enter the password to confirm" th:field="*{conpassword}" required>

    <div class="logpage">
        <p>Already have an account: <a th:href="@{/login}">Login</a></p>
    </div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
